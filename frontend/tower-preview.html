<!doctype html>
<html lang="en"><head><meta charset="utf-8" /><link rel="stylesheet" href="src/styles/globals.css" />
<style>
  html,body{margin:0;min-height:100%}
  body{background:radial-gradient(120% 70% at 50% 4%,rgba(40,60,120,.3),transparent 55%),linear-gradient(to bottom,#050a1f,#0a1330 60%,#0c1638);padding:1rem 0 6rem}
  .navbar{position:fixed;top:0;left:0;right:0;height:4rem;background:rgba(4,10,28,.9);border-bottom:1px solid rgba(45,245,255,.2);z-index:50;display:flex;align-items:center;padding:0 1.5rem;color:#7fe9ff;font:700 14px Inter,sans-serif;letter-spacing:.1em}
  .tower-page-shell{--tower-cyan:45,245,255;--tower-blue:53,143,255;--tower-purple:176,74,255;--window-glow:.85}
  .tower-stack-column{width:min(100%,30rem);margin:0 auto}
</style></head>
<body class="tower-page-shell">
<div class="navbar">GIT-IT — TOWER</div>
<div class="tower-stage-grid"><div class="tower-stack-column" id="stack"></div></div>
<script>
const SWORD='<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="14.5 17.5 3 6 3 3 6 3 17.5 14.5"/><line x1="13" y1="19" x2="19" y2="13"/><line x1="16" y1="16" x2="20" y2="20"/><line x1="19" y1="21" x2="21" y2="19"/></svg>';
const TROPHY='<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>';
const ACC={easy:'0, 245, 212',medium:'53, 143, 255',hard:'176, 74, 255'};
const tdoor=(d,l,s,sel,locked)=>`<button class="trial-door ${locked?'is-locked':''}" data-difficulty="${d}" ${sel?"data-selected='true'":''} style="--level-accent:${ACC[d]};--door-accent:${ACC[d]}">
<span class="trial-door-arch"><span class="trial-door-interior"></span><span class="trial-door-leaf trial-door-leaf--left"><span class="trial-door-plank"></span></span><span class="trial-door-leaf trial-door-leaf--right"><span class="trial-door-plank"></span></span><span class="trial-door-gem"></span></span>
<span class="trial-door-label">${l}</span><span class="trial-door-state">${s}</span><span class="door-ring"></span></button>`;
const trial=(n,t,selE)=>`<article class="trial-room"><div class="trial-room-header"><span class="trial-room-kicker">Trial ${n}</span><h3 class="trial-room-title">${t}</h3></div><p class="trial-room-summary">Combine staging, committing, and switching branches.</p><div class="trial-door-row">${tdoor('easy','Easy','Start',selE,false)}${tdoor('medium','Medium','Locked',false,true)}${tdoor('hard','Hard','Locked',false,true)}</div></article>`;
const adv=(sel)=>`<button class="adventure-door" ${sel?"data-selected='true'":''}><span class="adventure-door-frame"><span class="adventure-door-interior"></span><span class="adventure-door-leaf adventure-door-leaf--left"><span class="adventure-door-plank"></span><span class="adventure-door-brace adventure-door-brace--top"></span><span class="adventure-door-brace adventure-door-brace--bottom"></span></span><span class="adventure-door-leaf adventure-door-leaf--right"><span class="adventure-door-plank"></span><span class="adventure-door-brace adventure-door-brace--top"></span><span class="adventure-door-brace adventure-door-brace--bottom"></span></span><span class="adventure-door-gem"></span></span><span class="door-ring"></span></button>`;
const base=`<div class="tower-crystal"></div><div class="tower-floats"><span class="tower-float tower-float--1"></span><span class="tower-float tower-float--purple tower-float--2"></span><span class="tower-float tower-float--3"></span><span class="tower-float tower-float--purple tower-float--4"></span><span class="tower-float tower-float--5"></span><span class="tower-float tower-float--6"></span><span class="tower-float tower-float--7"></span><span class="tower-float tower-float--purple tower-float--8"></span></div>`;
const storey=(first,last,advSel)=>`<section class="storey-section"><div class="learning-tower ${first?'':'learning-tower-continuation'}"><div class="tower-repeater">
<div class="tower-window-stage">${first?'<div class="tower-window-roof"><span class="tower-window-roof-spire"></span><span class="tower-window-roof-peak"></span><span class="tower-window-roof-finial tower-window-roof-finial--left"></span><span class="tower-window-roof-finial tower-window-roof-finial--right"></span></div>':''}<div class="tower-window-storey"><span class="tower-window-storey-window"></span><span class="tower-window-storey-window"></span><span class="tower-window-storey-window"></span></div></div>
<section class="tower-adventure-stage"><span class="tower-stage-icon tower-stage-icon--cyan">${SWORD}</span><h2 class="tower-stage-title tower-stage-title--adventure">Command Adventure</h2><div class="tower-adventure-door-wrap">${adv(advSel)}</div></section>
<div class="tower-section-separator"><span class="tower-section-separator-gem"></span></div>
<section class="tower-challenges-stage"><span class="tower-stage-icon tower-stage-icon--purple">${TROPHY}</span><h2 class="tower-stage-title tower-stage-title--challenge">GIT Challenged</h2><div class="challenge-room-stack">${trial(1,'Stage, Commit, Then Switch Branches',!advSel)}${trial(2,'Rebase the Feature Branch',false)}</div></section>
${last?base:'<div class="tower-section-separator is-continuation"><span class="tower-section-separator-gem"></span></div>'}
</div></div></section>`;
document.getElementById('stack').innerHTML=location.search.includes('one')?storey(true,true,true):storey(true,false,true)+storey(false,true,false);
</script></body></html>
