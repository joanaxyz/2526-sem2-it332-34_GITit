<svg data-piece-art="arcane-spire-v2" viewBox="0 0 88.8 128.7" xmlns="http://www.w3.org/2000/svg">
  <!-- Trial gate. ONE asset carries all three difficulty tiers as
       `data-door-tier` groups; the tower shows the matching one via
       `.trial-door[data-difficulty=...]` (the editor/palette falls back to the
       medium tier). Each tier is a distinct, self-contained silhouette with its
       colours baked in and its Roman numeral carved in the keystone
       (I = plank door, II = iron portcullis, III = demon gate) so a skinned or
       uploaded door renders identically without any platform CSS. CSS only
       drives the slide-up `gate` reveal + the interior-light interaction. -->
  <defs>
    <linearGradient id="arch" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(8,28,46,0.99)"/>
      <stop offset="100%" stop-color="rgba(2,12,24,0.995)"/>
    </linearGradient>
    <linearGradient id="plank" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(11,31,50,0.99)"/>
      <stop offset="100%" stop-color="rgba(3,14,27,0.995)"/>
    </linearGradient>
    <clipPath id="archClipEasy">
      <path d="M3,128.7 V45 A41.4,41.4 0 0 1 85.8,45 V128.7 Z"/>
    </clipPath>
    <clipPath id="archClipMedium">
      <path d="M2,125.8 V42.4 A40.4,40.4 0 0 1 42.4,2 L46.4,2 A40.4,40.4 0 0 1 86.8,42.4 V125.8 A2.9,2.9 0 0 1 83.9,128.7 L4.9,128.7 A2.9,2.9 0 0 1 2,125.8 Z"/>
    </clipPath>
    <clipPath id="archClipHard">
      <path d="M3,128.7 V47 A42.5,42.5 0 0 1 44.4,8 A42.5,42.5 0 0 1 85.8,47 V128.7 Z"/>
    </clipPath>
  </defs>

  <!-- ===================== EASY (I) — plank door ===================== -->
  <g data-door-tier="easy">
    <g clip-path="url(#archClipEasy)">
      <rect x="2" y="2" width="84.8" height="126.7" fill="url(#arch)"/>
      <rect data-role="interior" class="trial-door-interior" x="2" y="2" width="84.8" height="126.7" fill="rgba(2,11,22,0.9)"/>
      <g data-role="gate" class="trial-door-gate">
        <g fill="url(#plank)">
          <rect x="6" y="2" width="14.4" height="126.7"/>
          <rect x="21.6" y="2" width="14.4" height="126.7"/>
          <rect x="37.2" y="2" width="14.4" height="126.7"/>
          <rect x="52.8" y="2" width="14.4" height="126.7"/>
          <rect x="68.4" y="2" width="14.4" height="126.7"/>
        </g>
        <g stroke="rgba(0,245,212,0.32)" stroke-width="1">
          <line x1="21.6" y1="6" x2="21.6" y2="124"/>
          <line x1="37.2" y1="6" x2="37.2" y2="124"/>
          <line x1="52.8" y1="6" x2="52.8" y2="124"/>
          <line x1="68.4" y1="6" x2="68.4" y2="124"/>
        </g>
        <rect x="6" y="34" width="76.8" height="4.4" rx="0.8" fill="rgba(0,245,212,0.7)"/>
        <rect x="6" y="92" width="76.8" height="4.4" rx="0.8" fill="rgba(0,245,212,0.7)"/>
        <circle cx="69" cy="65" r="4.6" fill="none" stroke="rgba(0,245,212,0.78)" stroke-width="2"/>
      </g>
    </g>
    <path d="M3,128.7 V45 A41.4,41.4 0 0 1 85.8,45 V128.7" fill="none" stroke="rgba(0,245,212,0.82)" stroke-width="2"/>
    <path d="M9.6,128.7 V45.6 A34.8,34.8 0 0 1 79.2,45.6 V128.7" fill="none" stroke="rgba(0,245,212,0.4)" stroke-width="1.5"/>
    <g>
      <circle cx="44.4" cy="14.6" r="9.4" fill="url(#arch)" stroke="rgba(0,245,212,0.88)" stroke-width="1.7"/>
      <path d="M44.4,10.4 V18.8 M41.7,10.4 H47.1 M41.7,18.8 H47.1" fill="none" stroke="rgb(150,255,238)" stroke-width="1.9" stroke-linecap="round"/>
    </g>
  </g>

  <!-- ================== MEDIUM (II) — iron portcullis ================== -->
  <g data-door-tier="medium">
    <g clip-path="url(#archClipMedium)">
      <rect x="2" y="2" width="84.8" height="126.7" fill="url(#arch)"/>
      <rect data-role="interior" class="trial-door-interior" x="2" y="2" width="84.8" height="126.7" fill="rgba(2,11,22,0.9)"/>
      <g data-role="gate" class="trial-door-gate">
        <g fill="rgba(96,168,255,0.72)">
          <rect x="22.4" y="6" width="3.6" height="118" rx="0.7"/>
          <rect x="35.9" y="6" width="3.6" height="118" rx="0.7"/>
          <rect x="49.4" y="6" width="3.6" height="118" rx="0.7"/>
          <rect x="62.9" y="6" width="3.6" height="118" rx="0.7"/>
          <rect x="8" y="34" width="72.8" height="3.4" rx="0.7"/>
          <rect x="8" y="71.8" width="72.8" height="3.4" rx="0.7"/>
          <rect x="8" y="109.6" width="72.8" height="3.4" rx="0.7"/>
        </g>
        <path d="M5,128.7 V41 A36,36 0 0 1 41,5 L47.8,5 A36,36 0 0 1 83.8,41 V128.7" fill="none" stroke="rgba(96,168,255,0.42)" stroke-width="3.4"/>
      </g>
    </g>
    <path d="M2,125.8 V42.4 A40.4,40.4 0 0 1 42.4,2 L46.4,2 A40.4,40.4 0 0 1 86.8,42.4 V125.8 A2.9,2.9 0 0 1 83.9,128.7 L4.9,128.7 A2.9,2.9 0 0 1 2,125.8 Z" fill="none" stroke="rgba(96,168,255,0.8)" stroke-width="2"/>
    <path d="M9.4,122.9 V39.5 A32.8,32.8 0 0 1 42.2,6.7 L46.6,6.7 A32.8,32.8 0 0 1 79.4,39.5 V122.9" fill="none" stroke="rgba(96,168,255,0.42)" stroke-width="1.5"/>
    <g>
      <path d="M37.4,5 H51.4 L54,21 H34.8 Z" fill="url(#arch)" stroke="rgba(96,168,255,0.88)" stroke-width="1.7" stroke-linejoin="round"/>
      <path d="M41.6,9.4 V17 M39.2,9.4 H44 M39.2,17 H44 M47.2,9.4 V17 M44.8,9.4 H49.6 M44.8,17 H49.6" fill="none" stroke="rgb(168,202,255)" stroke-width="1.8" stroke-linecap="round"/>
    </g>
  </g>

  <!-- ==================== HARD (III) — demon gate ==================== -->
  <g data-door-tier="hard">
    <g clip-path="url(#archClipHard)">
      <rect x="2" y="2" width="84.8" height="126.7" fill="url(#arch)"/>
      <rect data-role="interior" class="trial-door-interior" x="2" y="2" width="84.8" height="126.7" fill="rgba(2,11,22,0.9)"/>
      <g data-role="gate" class="trial-door-gate">
        <g fill="rgba(206,138,255,0.74)">
          <path d="M19.6,8 H26.4 V110 L23,120 L19.6,110 Z"/>
          <path d="M33.2,8 H40 V114 L36.6,124 L33.2,114 Z"/>
          <path d="M48.8,8 H55.6 V114 L52.2,124 L48.8,114 Z"/>
          <path d="M62.4,8 H69.2 V110 L65.8,120 L62.4,110 Z"/>
        </g>
        <path d="M8,42 L20,38 L32,42 L44,38 L56,42 L68,38 L80,42 L80,47 L68,43 L56,47 L44,43 L32,47 L20,43 L8,47 Z" fill="rgba(206,138,255,0.7)"/>
        <g fill="rgba(255,96,128,0.9)">
          <path d="M34.4,64 L38.6,68.2 L34.4,72.4 L30.2,68.2 Z"/>
          <path d="M54.4,64 L58.6,68.2 L54.4,72.4 L50.2,68.2 Z"/>
        </g>
      </g>
    </g>
    <path d="M3,128.7 V47 A42.5,42.5 0 0 1 44.4,8 A42.5,42.5 0 0 1 85.8,47 V128.7" fill="none" stroke="rgba(206,138,255,0.82)" stroke-width="2"/>
    <path d="M10,128.7 V47.4 A35.6,35.6 0 0 1 44.4,15 A35.6,35.6 0 0 1 78.8,47.4 V128.7" fill="none" stroke="rgba(206,138,255,0.42)" stroke-width="1.5"/>
    <g fill="url(#arch)" stroke="rgba(206,138,255,0.85)" stroke-width="1.9" stroke-linejoin="round">
      <path d="M36,12 C30,4 24,2 19,4 C24,5 27,8 28.6,15 Z"/>
      <path d="M52.8,12 C58.8,4 64.8,2 69.8,4 C64.8,5 61.8,8 60.2,15 Z"/>
    </g>
    <g>
      <path d="M37,9 H51.8 L55,26 L44.4,31 L33.8,26 Z" fill="url(#arch)" stroke="rgba(206,138,255,0.9)" stroke-width="1.7" stroke-linejoin="round"/>
      <path d="M39.8,13.6 V20.6 M37.6,13.6 H42 M37.6,20.6 H42 M44.4,13.6 V20.6 M42.2,13.6 H46.6 M42.2,20.6 H46.6 M49,13.6 V20.6 M46.8,13.6 H51.2 M46.8,20.6 H51.2" fill="none" stroke="rgb(226,172,255)" stroke-width="1.7" stroke-linecap="round"/>
    </g>
  </g>
</svg>
