<!doctype html>
<html lang="en">
  <body style="margin:0;background:#07111f;color:#eaf6ff;font-family:Arial,sans-serif;padding:32px">
    <div style="max-width:560px;margin:0 auto;background:#0b1b31;border:1px solid #1d6b9e;border-radius:12px;padding:28px">
      <h1 style="margin-top:0;color:#5fd6ff">Reset your GIT it! password</h1>
      <p>Hello {{ user.username }},</p>
      <p>We received a request to reset your password.</p>
      <p style="margin:28px 0">
        <a href="{{ reset_url }}" style="display:inline-block;background:#0ea5e9;color:#04111d;text-decoration:none;font-weight:700;padding:12px 18px;border-radius:8px">Choose a new password</a>
      </p>
      <p>If you did not request this, you can ignore this email. The link will expire automatically.</p>
    </div>
  </body>
</html>
